<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACM | Lab Facilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/navbar.css" />
  <link rel="stylesheet" href="./assets/css/facilities.css" />
  <link rel="stylesheet" href="./assets/css/footer.css" />
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- Ribbon -->
  <section class="ribbon">
    <h1 id="ribbonTitle"></h1>
    <p id="ribbonDesc"></p>
  </section>

  <!-- Stats Bar -->
  <section class="fac-stats">
    <div class="fac-stats-grid" id="facStatsGrid"></div>
  </section>

  <!-- Filter Tabs -->
  <section class="fac-section">
    <div class="fac-container">

      <div class="fac-filter" id="facFilter"></div>

      <!-- Equipment Grid -->
      <div class="fac-grid" id="facGrid"></div>

      <!-- Empty State -->
      <div class="fac-empty hidden" id="facEmpty">
        <i class="bi bi-search"></i>
        <p>No equipment found in this category.</p>
      </div>

    </div>
  </section>

  <!-- Access & Safety -->
  <section class="fac-info-section">
    <div class="fac-container">
      <div class="fac-info-grid" id="facInfoGrid"></div>
    </div>
  </section>

  <footer id="footer-placeholder"></footer>

  <script type="module" src="./assets/js/app.js"></script>
  <script type="module" src="./assets/js/facilities.js"></script>

</body>
</html>
