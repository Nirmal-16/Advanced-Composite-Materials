<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACM | Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/gallery.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/navbar.css" />
  <link rel="stylesheet" href="./assets/css/footer.css" />
</head>
<body>

<div id="navbar-placeholder"></div>

<!-- ═══════════════════ HERO ═══════════════════ -->
<section class="hero">
  <div class="hero-deco"></div>
  <div class="hero-deco hero-deco--sm"></div>
  <div class="hero-line"></div>
  <h1>Research <span>Gallery</span></h1>
  <p>A visual chronicle of conferences, workshops, field studies, and milestones that define our research journey.</p>
  <div class="breadcrumb">
    <a href="#">Home</a><span class="sep">›</span>
    <span class="cur">Gallery</span>
  </div>
</section>

<!-- ═══════════════════ FILTER BAR ═══════════════════ -->
<div class="filter-wrap">
  <div class="filter-bar" id="filterBar">
    <!-- injected by JS -->
  </div>
</div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<main>
  <div class="gallery-stats" id="galleryStats"></div>
  <div class="masonry-grid" id="masonryGrid">
    <div class="loading-state">Loading gallery…</div>
  </div>
</main>

<!-- ═══════════════════ MODAL ═══════════════════ -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">

    <button class="modal-close" id="modalClose" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- prev / next -->
    <button class="modal-nav modal-nav--prev" id="modalPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button class="modal-nav modal-nav--next" id="modalNext" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <div class="modal-inner">
      <!-- image pane -->
      <div class="modal-img-pane">
        <img id="modalImg" src="" alt="" />
        <div class="modal-img-fallback" id="modalFallback">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <div class="modal-counter" id="modalCounter"></div>
      </div>

      <!-- info pane -->
      <div class="modal-info-pane">
        <div class="modal-category" id="modalCategory"></div>
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-desc"  id="modalDesc"></p>

        <div class="modal-meta">
          <div class="modal-meta-row">
            <div class="modal-meta-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#58e3e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div>
              <span class="modal-meta-label">Venue</span>
              <span class="modal-meta-value" id="modalVenue"></span>
            </div>
          </div>

          <div class="modal-meta-row">
            <div class="modal-meta-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#58e3e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <div>
              <span class="modal-meta-label">Timeline</span>
              <span class="modal-meta-value" id="modalTimeline"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer id="footer-placeholder"></footer>

<script type="module" src="./assets/js/app.js"></script>
<script type="module" src="assets/js/gallery.js"></script>
</body>
</html>
