<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sponsored Projects | Research</title>
  <link rel="stylesheet" href="assets/css/sponsored-projects.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/navbar.css" />
  <link rel="stylesheet" href="./assets/css/footer.css" />
</head>
<body>

<div id="navbar-placeholder"></div>

<!-- ═══════════════════════════ HERO ═══════════════════════════ -->
<section class="hero">
  <div class="hero-deco"></div>
  <div class="hero-line"></div>
  <h1>Sponsored <span>Projects</span></h1>
  <p>Externally funded research initiatives driving innovation, collaboration, and scientific excellence across multiple domains.</p>
  <div class="breadcrumb">
    <a href="#">Home</a>
    <span class="sep">›</span>
    <a href="#">Research</a>
    <span class="sep">›</span>
    <span class="cur">Sponsored Projects</span>
  </div>
</section>

<!-- ═══════════════════════════ MAIN ═══════════════════════════ -->
<main>

  <!-- Tab Switcher -->
  <div class="tab-bar" role="tablist">
    <button
      class="tab-btn active"
      id="tab-ongoing"
      role="tab"
      aria-selected="true"
      aria-controls="panel-ongoing"
      onclick="switchTab('ongoing')"
    >
      Ongoing Projects <span class="tab-dot"></span>
    </button>
    <button
      class="tab-btn"
      id="tab-completed"
      role="tab"
      aria-selected="false"
      aria-controls="panel-completed"
      onclick="switchTab('completed')"
    >
      Completed Projects <span class="tab-dot"></span>
    </button>
  </div>

  <!-- ── ONGOING PANEL ── -->
  <div class="panel active" id="panel-ongoing" role="tabpanel">
    <div class="section-header">
      <h2 class="section-title">Ongoing <span>Projects</span></h2>
      <span class="project-count" id="count-ongoing"></span>
    </div>
    <div class="card-grid" id="grid-ongoing"></div>
  </div>

  <!-- ── COMPLETED PANEL ── -->
  <div class="panel" id="panel-completed" role="tabpanel">
    <div class="section-header">
      <h2 class="section-title">Completed <span>Projects</span></h2>
      <span class="project-count" id="count-completed"></span>
    </div>
    <div class="card-grid" id="grid-completed"></div>
  </div>

</main>

<footer id="footer-placeholder"></footer>

<script type="module" src="./assets/js/app.js"></script>

<script type="module" src="assets/js/sponsored-projects.js"></script>
</body>
</html>
